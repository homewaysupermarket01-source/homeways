<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Locations - Homeway Supermarket</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
  background: #fff8f2;
}
/* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 30px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 50px;
      font-weight: bolder;
      color: #12b8eb;
    }
    .logo img {
  height: 100px;   /* controls size */
  width: 200px;    /* keeps proportions */
  display: block;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

    nav a {
      margin: 0 12px;
      text-decoration: none;
      color: #555;
      font-size: 14px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #f28c28;
    }

    .feedback {
      background: #1f6b5c;
      color: #fff;
      padding: 8px 14px;
      border-radius: 4px;
    }
/* GRID */
.locations {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    padding: 40px 10%;
}

/* CARD */
.card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* CONTENT */
.card-content {
    padding: 20px;
}

.card-content h3 {
    margin-bottom: 10px;
    color: #333;
}

.card-content p {
    font-size: 14px;
    margin-bottom: 15px;
    color: #555;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 18px;
    background: #0a7cff;
    color: white;
    border-radius: 25px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #065ec2;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    margin-top: 30px;
    font-size: 14px;
    color: #777;
}

/* RESPONSIVE */
@media(max-width: 768px) {
    .header h1 {
        font-size: 30px;
    }
}
</style>
</head>
<header>
  <div class="logo">HOMEWAYS</div>
    <div class="logo">
    <img src="logo.png" alt="Supermarket Logo">
  </div>
   <nav>
    <a href="about.html" class="index">About Us</a>
    <a href="location.html"class="locations">Locations</a>
    <a href="offers.html"class="offers">Offers</a>
    <a href="career.html"class="careers">Careers</a>
   <a href="Bakery.html"class="bakery">Bakery</a>
     <a href="index.html" class="index">Home</a>
    <a href="feed.html" class="feedback">Feedback</a>
  </nav>
</header>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>📍 Our Branches</h1>
    <p>Find your nearest Homeway Supermarket branch</p>
</div>

<!-- LOCATIONS -->
<div class="locations" id="locationsContainer"></div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Homeway Supermarket | The Home of Affordability 🛒
</div>

<script>
const branches = [
    {
        name: "Homeway Kiganjo Corner 1",
        location: "Kiganjo Estate, Kamenu",
        image: "1.jpg",
        map: "https://maps.app.goo.gl/RkKRjsgpDuCuUBhG9i"
    },
    {
        name: "Homeway Kiganjo Corner 2",
        location: "Kiganjo Estate, Kamenu",
        image: "2.jpg",
        map: "https://maps.app.goo.gl/QYwTZ4cgHVXrgrCu5"
    },
    {
        name: "Homeway Thika Town",
        location: "Thika Town, Thika",
        image: "3.jpg",
        map: "https://maps.app.goo.gl/adUidy5JephX5bg46"
    },
    {
        name: "Homeway Witeithie main Stage",
        location: "Witeithie, Juja",
        image: "4.jpg",
        map: "https://maps.app.goo.gl/EFUJ3p6C88npES5X9"
    },
    {
        name: "Homeway Witeithie Sokoni",
        location: "Witeithie, Juja",
        image: "5.jpg",
        map: "https://maps.app.goo.gl/EFUJ3p6C88npES5X9"
    },
    {
        name: "Homeway Kenyatta Road",
        location: "Kroad, Juja",
        image: "6.jpg",
        map: "https://maps.app.goo.gl/KSzbS4GqDdDErzri9"
    },
    {
        name: "Homeway Gwakairo",
        location: "Gwakairo, Ruiru",
        image: "7.jpg",
        map: "https://maps.app.goo.gl/Ma6doJazg6DcBZ979"
    }
];

// Render branches
const container = document.getElementById("locationsContainer");

branches.forEach(branch => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${branch.image}" alt="${branch.name}">
        <div class="card-content">
            <h3>${branch.name}</h3>
            <p>${branch.location}</p>
            <a href="${branch.map}" target="_blank" class="btn">📍 Open in Google Maps</a>
        </div>
    `;

    container.appendChild(card);
});
</script>

</body>
</html>
